---
classes:
  - "profile::core::common"
  - "profile::core::htcondor"
  - "profile::core::nfsclient"

profile::core::htcondor::htcondor_version: "23.0"
profile::core::htcondor::htcondor_host: "htcondor-cm.dev.lsst.org"

nfs::client_enabled: true
nfs::client_mounts:
  /mnt/project:
    share: "project"
    server: "nfs-project.ls.lsst.org"
    atboot: true
  /mnt/rsphome:
    share: "rsphome"
    server: "nfs-rsphome.ls.lsst.org"
    atboot: true
